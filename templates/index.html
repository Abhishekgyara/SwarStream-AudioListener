<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sonata Flow | YouTube MP3 Downloader</title>
    <!-- Google Fonts + Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #469c8f 0%, #2058d1 50%, #2f05ee 100%);
            color: #f0f3fa;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
        }

        /* animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 123, 44, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 87, 34, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* modern scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff7b2c, #ff5722);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff7b2c;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* main flex layout - mobile first then desktop */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* sidebar - glassmorphism */
        .sidebar {
            background: rgba(18, 18, 28, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 123, 44, 0.2);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .sidebar:hover {
            border-color: rgba(255, 123, 44, 0.4);
            box-shadow: 0 25px 40px -12px rgba(255, 123, 44, 0.15);
        }

        /* profile card */
        .profile-card {
            background: linear-gradient(135deg, rgba(255, 123, 44, 0.15) 0%, rgba(255, 87, 34, 0.05) 100%);
            border-radius: 1.25rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            border-left: 3px solid #ff7b2c;
            transition: transform 0.2s ease;
        }

        .profile-card:hover {
            transform: translateX(4px);
        }

        #welcomeText {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(120deg, #fff, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #welcomeText::before {
            content: '🎧';
            font-size: 1.3rem;
            background: none;
            -webkit-background-clip: unset;
            color: #ff7b2c;
        }

        #purposeText {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title {
            font-weight: 700;
            font-size: 1rem;
            margin: 1.5rem 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.2px;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: #ff7b2c;
        }

        .section-title i {
            font-size: 1rem;
        }

        .history-item {
            background: rgba(30, 30, 42, 0.7);
            backdrop-filter: blur(4px);
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-item i {
            color: #ff7b2c;
            font-size: 0.8rem;
        }

        .history-item:hover {
            background: rgba(255, 123, 44, 0.15);
            transform: translateX(5px);
            border-color: #ff7b2c;
        }

        .download-item {
            background: rgba(30, 30, 42, 0.7);
            backdrop-filter: blur(4px);
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .download-item:hover {
            background: rgba(44, 155, 110, 0.1);
            border-color: #2c9b6e;
        }

        .download-title {
            font-weight: 500;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 4px;
        }

        .download-date {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .clear-btn {
            background: rgba(255, 70, 70, 0.1);
            border: 1px solid rgba(255, 70, 70, 0.3);
            color: #ff8a7a;
            border-radius: 2rem;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 12px;
            width: 100%;
            transition: all 0.25s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .clear-btn:hover {
            background: rgba(255, 70, 70, 0.25);
            color: white;
            border-color: #ff5e3a;
            transform: translateY(-2px);
        }

        /* main content area */
        .main-content {
            background: rgba(12, 12, 20, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.8rem;
            border: 1px solid rgba(255, 123, 44, 0.2);
            transition: all 0.3s ease;
        }

        .main-content:hover {
            border-color: rgba(255, 123, 44, 0.35);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(130deg, #ffffff, #ffb347, #ff7b2c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .subhead {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        /* search bar */
        .search-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 1.5rem 0 2rem;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff7b2c;
            font-size: 1rem;
            z-index: 1;
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px 14px 45px;
            background: #1e1e2c;
            border: 2px solid #2c2c3a;
            border-radius: 3rem;
            color: white;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: #ff7b2c;
            box-shadow: 0 0 0 3px rgba(255, 123, 44, 0.2);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(105deg, #ff7b2c, #ff5722);
            border: none;
            border-radius: 3rem;
            padding: 0 32px;
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 87, 34, 0.4);
            gap: 12px;
        }

        /* video results grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0 1.5rem;
        }

        .video-card {
            background: #14141e;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 123, 44, 0.1);
            cursor: pointer;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-card:hover {
            transform: translateY(-6px);
            border-color: #ff7b2c;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.6);
        }

        .video-card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .video-card:hover img {
            transform: scale(1.02);
        }

        .card-content {
            padding: 1rem;
        }

        .video-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            min-height: 2.8rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .play-btn {
            background: rgba(255, 123, 44, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            justify-content: center;
        }

        .play-btn:hover {
            background: #ff7b2c;
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(255, 123, 44, 0.3);
        }

        .download-link {
            background: rgba(44, 155, 110, 0.2);
            border: none;
            padding: 8px 14px;
            border-radius: 2rem;
            text-decoration: none;
            color: #a5f0d0;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            cursor: pointer;
            flex: 1;
            justify-content: center;
        }

        .download-link:hover {
            background: #2c9b6e;
            color: white;
            transform: scale(0.96);
        }

        /* audio player */
        .player-section {
            margin-top: 2rem;
            background: linear-gradient(135deg, #0e0e16, #13131d);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 123, 44, 0.2);
        }

        .player-icon {
            font-size: 2rem;
            color: #ff7b2c;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        #player {
            flex: 1;
            min-width: 200px;
            height: 48px;
            border-radius: 2rem;
            background: #1e1e2c;
        }

        /* modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-card {
            background: linear-gradient(135deg, #1a1a2a, #161622);
            max-width: 450px;
            width: 100%;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            border: 1px solid #ff7b2c;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-card h2 {
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #ff7b2c;
        }

        .modal-card input, .modal-card select {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            background: #0e0e18;
            border: 1px solid #333;
            border-radius: 2rem;
            color: white;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .modal-card input:focus, .modal-card select:focus {
            outline: none;
            border-color: #ff7b2c;
        }

        .modal-card button {
            background: linear-gradient(105deg, #ff7b2c, #ff5722);
            border: none;
            padding: 12px 24px;
            border-radius: 2rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
            transition: transform 0.2s;
        }

        .modal-card button:hover {
            transform: translateY(-2px);
        }

        .empty-message {
            text-align: center;
            opacity: 0.6;
            padding: 20px;
            font-size: 0.85rem;
        }

        /* loading spinner */
        .loading {
            text-align: center;
            padding: 40px;
            color: #ff7b2c;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* responsive */
        @media (min-width: 900px) {
            .dashboard {
                flex-direction: row;
                align-items: flex-start;
            }
            .sidebar {
                width: 320px;
                position: sticky;
                top: 1rem;
                max-height: calc(100vh - 2rem);
                overflow-y: auto;
            }
            .main-content {
                flex: 1;
            }
            .app-container {
                padding: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .card-actions {
                flex-direction: column;
            }
            .play-btn, .download-link {
                width: 100%;
            }
            h1 {
                font-size: 1.3rem;
            }
            .btn-primary {
                padding: 0 20px;
            }
            .main-content {
                padding: 1.2rem;
            }
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            font-size: 0.7rem;
            opacity: 0.5;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="profile-card">
                <div id="welcomeText"></div>
                <div id="purposeText"></div>
            </div>
            
            <div class="section-title"><i class="fas fa-history"></i> SEARCH HISTORY</div>
            <div id="history"></div>
            <button class="clear-btn" onclick="clearHistory()"><i class="fas fa-trash-alt"></i> Clear History</button>

            <div class="section-title" style="margin-top: 1.8rem;"><i class="fas fa-download"></i> RECENT DOWNLOADS</div>
            <div id="downloads"></div>
            <button class="clear-btn" onclick="clearDownloads()"><i class="fas fa-eraser"></i> Clear Downloads</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <h1><i class="fab fa-youtube" style="color:#ff3b2f;"></i> Swar Stream</h1>
            <div class="subhead">Stream & download any YouTube audio as MP3</div>
            
            <div class="search-container">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search song, artist, or podcast..." autocomplete="off">
                </div>
                <button class="btn-primary" onclick="searchVideos()"><i class="fas fa-music"></i> Search</button>
            </div>
            
            <div id="results" class="results-grid"></div>
            
            <div class="player-section">
                <i class="fas fa-headphones player-icon"></i>
                <audio id="player" controls preload="none" style="width: 100%;"></audio>
            </div>
        </main>
    </div>
    <footer>🎵 Instant streaming • MP3 downloads • Your personal audio hub</footer>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
    <div class="modal-card">
        <h2><i class="fas fa-user-astronaut"></i> Welcome to Swar Stream</h2>
        <input type="text" id="username" placeholder="Enter your name" autocomplete="off">
        <select id="purpose">
            <option value="Music">🎵 Music Lover</option>
            <option value="Study">📚 Study Focus</option>
            <option value="Podcast">🎙️ Podcast Enthusiast</option>
            <option value="Other">🌈 Other Vibes</option>
        </select>
        <button onclick="saveProfile()"><i class="fas fa-check-circle"></i> Start Exploring</button>
    </div>
</div>

<script>
    // Keep ALL original functionality - no changes to how videos are fetched or played
    // Only UI/UX enhancements
    
    // Profile functions (unchanged logic)
    function saveProfile() {
        let profile = {
            name: document.getElementById("username").value,
            purpose: document.getElementById("purpose").value
        };
        localStorage.setItem("userProfile", JSON.stringify(profile));
        document.getElementById("profileModal").style.display = "none";
        showProfile();
    }

    function loadProfile() {
        let profile = JSON.parse(localStorage.getItem("userProfile"));
        if (!profile) {
            document.getElementById("profileModal").style.display = "flex";
            return;
        }
        showProfile();
    }

    function showProfile() {
        let profile = JSON.parse(localStorage.getItem("userProfile"));
        if (profile) {
            document.getElementById("welcomeText").innerHTML = "Welcome " + profile.name;
            document.getElementById("purposeText").innerHTML = "Purpose: " + profile.purpose;
        }
    }

    // Search function - KEEP ORIGINAL FETCH LOGIC
    async function searchVideos() {
        let query = document.getElementById("searchInput").value;
        if (!query.trim()) return;
        
        saveSearch(query);
        
        // Show loading state
        let resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Loading tracks...</div>';
        
        try {
            let response = await fetch(`/search?q=${encodeURIComponent(query)}`);
            let data = await response.json();
            renderResults(data);
        } catch (error) {
            resultsDiv.innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-circle"></i> Error loading results</div>';
        }
    }

    function renderResults(videos) {
        let resultsDiv = document.getElementById("results");
        if (!videos || videos.length === 0) {
            resultsDiv.innerHTML = '<div class="empty-message"><i class="fas fa-music"></i> No results found</div>';
            return;
        }
        
        resultsDiv.innerHTML = "";
        videos.forEach(video => {
            let card = document.createElement("div");
            card.className = "video-card";
            card.innerHTML = `
                <img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" 
                     alt="${escapeHtml(video.title)}"
                     onerror="this.src='https://placehold.co/320x180/1f1f2f/ff7b2c?text=🎵'">
                <div class="card-content">
                    <div class="video-title">${escapeHtml(video.title)}</div>
                    <div class="card-actions">
                        <button class="play-btn" onclick="playAudio('${video.id}')">
                            <i class="fas fa-play-circle"></i> Play
                        </button>
                        <a class="download-link" href="/download/${video.id}" onclick="saveDownload('${escapeHtml(video.title)}')">
                            <i class="fas fa-download"></i> Download MP3
                        </a>
                    </div>
                </div>
            `;
            resultsDiv.appendChild(card);
        });
    }

    // Keep original playAudio
    async function playAudio(videoId) {
        let player = document.getElementById("player");
        try {
            let response = await fetch(`/play/${videoId}`);
            let data = await response.json();
            player.src = data.audio_url;
            player.play();
        } catch (error) {
            console.error("Playback error:", error);
        }
    }

    // History functions - unchanged
    function saveSearch(query) {
        let history = JSON.parse(localStorage.getItem("searchHistory")) || [];
        history = history.filter(item => item !== query);
        history.unshift(query);
        history = history.slice(0, 20);
        localStorage.setItem("searchHistory", JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem("searchHistory")) || [];
        let html = "";
        history.forEach(item => {
            html += `<div class="history-item" onclick="searchAgain('${escapeHtml(item)}')">
                        <i class="fas fa-clock"></i> ${escapeHtml(item)}
                    </div>`;
        });
        document.getElementById("history").innerHTML = html || '<div class="empty-message"><i class="fas fa-search"></i> No search history</div>';
    }

    function searchAgain(query) {
        document.getElementById("searchInput").value = query;
        searchVideos();
    }

    function clearHistory() {
        localStorage.removeItem("searchHistory");
        renderHistory();
    }

    // Download functions - unchanged
    function saveDownload(title) {
        let downloads = JSON.parse(localStorage.getItem("downloads")) || [];
        downloads.unshift({
            title: title,
            date: new Date().toLocaleString()
        });
        downloads = downloads.slice(0, 20);
        localStorage.setItem("downloads", JSON.stringify(downloads));
        renderDownloads();
    }

    function renderDownloads() {
        let downloads = JSON.parse(localStorage.getItem("downloads")) || [];
        let html = "";
        downloads.forEach(item => {
            html += `<div class="download-item">
                        <span class="download-title">🎵 ${escapeHtml(item.title)}</span>
                        <span class="download-date">${escapeHtml(item.date)}</span>
                    </div>`;
        });
        document.getElementById("downloads").innerHTML = html || '<div class="empty-message"><i class="fas fa-download"></i> No downloads yet</div>';
    }

    function clearDownloads() {
        localStorage.removeItem("downloads");
        renderDownloads();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Initialize
    window.onload = function() {
        loadProfile();
        renderHistory();
        renderDownloads();
    };
</script>
</body>
</html>
